name = "TNLean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["TNLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "Gametheory"
git = "https://github.com/LionSR/Brouwer.git"
rev = "main"

[[lean_lib]]
name = "TNLean"
