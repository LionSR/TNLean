name = "TNLean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["TNLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "Gametheory"
git = "https://github.com/LionSR/Brouwer.git"
rev = "main"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "TNLean"

# Text-based style linter driver for `Mathlib.Linter.TextBased.lintModules`.
# Run with `lake exe lint_style` (or `--fix` to auto-correct, `--github` for CI annotations).
[[lean_exe]]
name = "lint_style"
srcDir = "scripts"
root = "LintStyle"
supportInterpreter = true
