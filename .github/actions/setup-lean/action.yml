name: 'Setup Lean Toolchain'
description: 'Set up Lean toolchain with Mathlib cache and optional blueprint tools'

inputs:
  install-blueprint:
    description: 'Also install graphviz and leanblueprint (for blueprint workflows)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Lean toolchain and cache
      uses: leanprover/lean-action@v1
      with:
        use-mathlib-cache: true
        build: false

    - name: Install blueprint system dependencies
      if: inputs.install-blueprint == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          dvisvgm \
          graphviz \
          libgraphviz-dev \
          texlive-fonts-recommended \
          texlive-latex-extra \
          texlive-pictures

    - name: Set up Python for blueprint tooling
      if: inputs.install-blueprint == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install leanblueprint
      if: inputs.install-blueprint == 'true'
      shell: bash
      run: |
        pipx install leanblueprint
        pipx inject --include-apps --force leanblueprint plastex
        python3 -m pip install -r .github/requirements/blueprint-python.txt
