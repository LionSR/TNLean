name: Oversized Lean file guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One known oversized file remains on main and is grandfathered as a warning:
#   TNLean/MPS/ParentHamiltonian/Martingale.lean (1569 lines)
# This is tracked for future splitting. Once split, remove the corresponding
# ``--known`` argument below.
# New oversized files (any file over 1000 lines not listed here) cause the
# check to fail.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Check Lean file lengths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run oversized-file guard
        run: >
          python3 scripts/check_oversized_lean_files.py
          --root .
          --known TNLean/MPS/ParentHamiltonian/Martingale.lean
