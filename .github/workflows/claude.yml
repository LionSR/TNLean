name: Claude Code (Lean)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-respond-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Lean toolchain and cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false

      - name: Install graphviz headers (needed by pygraphviz)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install leanblueprint
        run: pipx install leanblueprint

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude,chatgpt-codex-connector,cursor[bot],cursor,copilot-pull-request-reviewer'

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Load Lean skills from the official leanprover skills repository
          plugin_marketplaces: 'https://github.com/leanprover/skills.git'
          plugins: 'lean@leanprover'

          claude_args: |
            --model claude-opus-4-6
            --allowed-tools "Bash(lake build),Bash(lake exe cache get),Bash(lake update),Bash(lake env),Bash(lean *),Bash(elan *),Bash(grep *),Bash(gh pr:*),Bash(gh issue:*),Bash(leanblueprint *),mcp__github__*"
            --append-system-prompt "This is a Lean 4 / Mathlib repository. Prefer minimal diffs. Use your judgment on when Mathlib scouting is warranted — it is essential when writing new proofs, closing sorrys, or choosing proof strategies, but unnecessary for cosmetic fixes, docstrings, imports, or renaming. When scouting IS warranted: first read all comments on the issue/PR for existing Mathlib Scouting Reports, then scout Mathlib yourself using exact?, apply?, rw?, simp?, and by grepping Mathlib source files for related definitions and theorems. Reuse Mathlib lemmas wherever possible rather than reproving from scratch. Before changing theorem statements, first try to complete the proof using existing lemmas. Validate with: lake build. Do not leave unrelated new sorrys. After substantial proof work, include a Mathlib Audit section in your comment listing which Mathlib lemmas/definitions you used or discovered (name, module path, and how it was used). Skip the audit for trivial changes. Always read existing review threads on the PR for context before responding. Reply directly to the review thread that triggered you. Do NOT resolve review threads yourself — leave resolution to humans or the automated review workflow."
