name: Blueprint

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - 'blueprint/src/**'
      - 'home_page/**'
  workflow_dispatch:

# Cancel previous runs if a new commit is pushed
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  blueprint:
    runs-on: ubuntu-latest
    name: Build and deploy blueprint
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graphviz headers
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install leanblueprint
        run: pip install leanblueprint

      - name: Debug - list blueprint source files
        run: |
          echo "=== CWD: $(pwd) ==="
          echo "=== blueprint/src/ ==="
          ls blueprint/src/ | head -10
          echo "=== blueprint/src/chapter/ ==="
          ls blueprint/src/chapter/ | head -5
          echo "=== blueprint/src/macros/ ==="
          ls blueprint/src/macros/
          echo "=== git root: $(git rev-parse --show-toplevel) ==="
          python3 -c "import plasTeX; print('plasTeX:', plasTeX.__file__)"

      - name: Build blueprint
        run: |
          set -o pipefail
          leanblueprint web --debug 2>&1 | tee /tmp/blueprint-output.txt
          if grep -q "^ERROR:" /tmp/blueprint-output.txt; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" /tmp/blueprint-output.txt; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --ci
