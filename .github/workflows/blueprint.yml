name: Blueprint

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - 'blueprint/src/**'
      - 'home_page/**'
  workflow_dispatch:

# Cancel previous runs if a new commit is pushed
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  blueprint:
    runs-on: ubuntu-latest
    name: Build and deploy blueprint
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graphviz headers
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install leanblueprint
        run: pip install leanblueprint

      - name: Build blueprint
        run: |
          set -o pipefail
          mkdir -p blueprint/web
          cd blueprint/src
          echo "=== Files in src ==="
          ls -la chapter/ | head -5
          ls -la macros/
          echo "=== Running plastex ==="
          plastex -c plastex.cfg web.tex 2>&1 | tee /tmp/blueprint-output.txt
          echo "=== Output files ==="
          ls ../web/ | head -10
          if grep -q "WARNING: File not found:" /tmp/blueprint-output.txt; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --ci
