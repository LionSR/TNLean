name: Blueprint

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - 'blueprint/src/**'
      - '.github/actions/setup-blueprint-system-deps/**'
      - '.github/requirements/**'
      - '.github/workflows/blueprint.yml'
      - 'home_page/**'
      - 'scripts/blueprint_bibtex.py'
      - 'scripts/write_badges.py'
  workflow_dispatch:

# Cancel previous runs if a new commit is pushed
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  blueprint:
    runs-on: ubuntu-latest
    name: Build and deploy blueprint
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        uses: ./.github/actions/setup-blueprint-system-deps

      - name: Install leanblueprint
        run: pip install leanblueprint -r .github/requirements/blueprint-python.txt

      - name: Write status badges
        run: python3 scripts/write_badges.py

      - name: Build blueprint bibliography
        run: python3 scripts/blueprint_bibtex.py

      - name: Build blueprint
        run: |
          set -o pipefail
          tmp_output_file="$(mktemp)"

          set +o pipefail
          leanblueprint web 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::warning::Blueprint has unresolved labels (see ERROR lines above)"
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi
          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi
          if grep -R "TikZ SVG unavailable" blueprint/web --include='*.html'; then
            echo "::error::Blueprint contains unrendered TikZ SVG placeholders"
            exit 1
          fi

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --ci
