name: Shared CI Auto-Fix

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string
        description: The commit SHA that failed
      head_branch:
        required: true
        type: string
        description: The PR branch name
      workflow_run_id:
        required: true
        type: number
        description: The ID of the failed workflow run
      pr_number:
        required: true
        type: number
        description: The PR number
      setup_lean:
        required: false
        type: boolean
        default: false
        description: Whether to set up the Lean toolchain before running Claude
      claude-prompt:
        required: false
        type: string
        description: The prompt to send to Claude
      claude-prompt-file:
        required: false
        type: string
        default: ''
        description: Optional path to a prompt file. Used when claude-prompt is empty.
      claude-prompt-context:
        required: false
        type: string
        default: ''
        description: Optional runtime context appended to the base prompt.
      allowed_tools:
        required: false
        type: string
        default: ''
        description: The tool allowlist passed as the Claude Code allowedTools value
      allowed_tools_preset:
        required: false
        type: string
        default: ''
        description: Named Claude Code allowedTools preset.
      system-prompt:
        required: false
        type: string
        description: Optional fallback content for APPEND_SYSTEM_PROMPT when no file or env var is provided.
        default: ''
      system-prompt-file:
        required: false
        type: string
        default: ''
        description: File path for APPEND_SYSTEM_PROMPT content.
      plugin_marketplaces:
        required: false
        type: string
        default: ''
        description: Plugin marketplace URLs (newline-separated). Leave empty to disable plugins.
      plugins:
        required: false
        type: string
        default: ''
        description: Plugins to load (e.g. lean@leanprover). Leave empty to disable plugins.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      DEEPSEEK_API_KEY:
        required: false

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_PROVIDER: ${{ vars.CLAUDE_CODE_PROVIDER || 'anthropic' }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
      CLAUDE_OPUS_MODEL: ${{ vars.CLAUDE_OPUS_MODEL }}
      CLAUDE_SONNET_MODEL: ${{ vars.CLAUDE_SONNET_MODEL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head_sha }}
          fetch-depth: 10
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach to PR branch
        uses: ./.github/actions/attach-pr-branch
        with:
          head-branch: ${{ inputs.head_branch }}

      - name: Check for previous auto-fix attempts
        id: loop_guard
        uses: ./.github/actions/bot-fix-guard

      - name: Setup git identity
        if: steps.loop_guard.outputs.skip != 'true'
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Set up Lean toolchain and cache
        if: inputs.setup_lean && steps.loop_guard.outputs.skip != 'true'
        uses: ./.github/actions/setup-lean

      - name: Get CI failure details
        if: steps.loop_guard.outputs.skip != 'true'
        id: failure_details
        uses: ./.github/actions/fetch-failure-logs
        with:
          workflow-run-id: ${{ inputs.workflow_run_id }}

      - name: Parse CI failure details
        if: steps.loop_guard.outputs.skip != 'true'
        id: failure_payload
        shell: bash
        env:
          FAILURE_DETAILS_RESULT: ${{ steps.failure_details.outputs.result }}
        run: |
          set -euo pipefail
          printf '%s\n' "$FAILURE_DETAILS_RESULT" > "$RUNNER_TEMP/failure-details.json"

          failure_run_url="$(jq -r '.runUrl // ""' "$RUNNER_TEMP/failure-details.json")"
          failed_jobs="$(jq -r '[.failedJobs[]?] | join(", ")' "$RUNNER_TEMP/failure-details.json")"
          error_logs="$(jq -c '.errorLogs // []' "$RUNNER_TEMP/failure-details.json")"
          {
            echo "failure_run_url=${failure_run_url}"
            echo "failed_jobs=${failed_jobs}"
            echo "error_logs=${error_logs}"
          } >> "$GITHUB_OUTPUT"

      - name: Compose Claude prompt
        if: steps.loop_guard.outputs.skip != 'true'
        id: compose-prompt
        uses: ./.github/actions/compose-auto-fix-prompt
        with:
          prompt: ${{ inputs['claude-prompt'] }}
          prompt-file: ${{ inputs['claude-prompt-file'] }}
          prompt-context: ${{ inputs['claude-prompt-context'] }}
          agent-name: Claude
          failure-run-url: ${{ steps.failure_payload.outputs.failure_run_url }}
          failed-jobs: ${{ steps.failure_payload.outputs.failed_jobs }}
          error-logs: ${{ steps.failure_payload.outputs.error_logs }}
          bot-iteration: ${{ steps.loop_guard.outputs.next_iteration }}
          bot-cap: ${{ steps.loop_guard.outputs.max_iterations }}
          pr-number: ${{ inputs.pr_number }}
          repository: ${{ github.repository }}
          head-branch: ${{ inputs.head_branch }}

      - name: Fix failures with Claude
        if: steps.loop_guard.outputs.skip != 'true'
        id: claude
        uses: ./.github/actions/claude-code-with-provider
        with:
          provider: ${{ env.CLAUDE_CODE_PROVIDER }}
          model-tier: opus
          allowed-bots: 'claude,chatgpt-codex-connector,cursor[bot],cursor,copilot-pull-request-reviewer'
          plugin_marketplaces: ${{ inputs.plugin_marketplaces }}
          plugins: ${{ inputs.plugins }}
          allowed_tools: ${{ inputs.allowed_tools }}
          allowed_tools_preset: ${{ inputs.allowed_tools_preset }}
          prompt: ${{ steps.compose-prompt.outputs.prompt }}

          system-prompt: ${{ inputs['system-prompt'] }}
          system-prompt-file: ${{ inputs['system-prompt-file'] }}
