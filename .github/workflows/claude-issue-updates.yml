name: Queue & Issue Updates on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  # Job 1: Lightweight — promote next issue in queue (pure gh CLI, no AI needed)
  promote-queue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      promoted_issue: ${{ steps.promote.outputs.issue_number }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Promote next queued issue
        id: promote
        run: |
          PR_NUM=${{ github.event.pull_request.number }}

          # 1. Find the oldest "queue-next" issue
          NEXT=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label "queue-next" --state open --sort created --json number \
            --jq '.[0].number // empty')

          if [ -n "$NEXT" ]; then
            echo "Promoting queue-next issue #$NEXT to queue-active"
            gh issue edit "$NEXT" --repo "$GITHUB_REPOSITORY" \
              --remove-label "queue-next" --add-label "queue-active"
            gh issue comment "$NEXT" --repo "$GITHUB_REPOSITORY" \
              --body "PR #$PR_NUM has been merged. This issue is now active. @claude please start working on this."
            echo "issue_number=$NEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. No queue-next? Promote the oldest "queue" issue to queue-next
          QUEUED=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label "queue" --state open --sort created --json number \
            --jq '.[0].number // empty')

          if [ -n "$QUEUED" ]; then
            echo "Promoting queue issue #$QUEUED to queue-next"
            gh issue edit "$QUEUED" --repo "$GITHUB_REPOSITORY" \
              --remove-label "queue" --add-label "queue-next"
            gh issue comment "$QUEUED" --repo "$GITHUB_REPOSITORY" \
              --body "PR #$PR_NUM has been merged. This issue has been promoted to next in queue."
            echo "issue_number=$QUEUED" >> "$GITHUB_OUTPUT"
          else
            echo "No queued issues found."
          fi

  # Job 2: AI-powered — only if you want smart summaries on related issues (optional)
  update-related-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude — summarize impact on related issues
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowed-tools "Bash(gh issue:*),Bash(gh pr:*),Bash(gh api:*)"
            --append-system-prompt "You are a concise project tracker for a Lean 4 / Mathlib repository. Keep comments brief."
          prompt: |
            PR #${{ github.event.pull_request.number }} ("${{ github.event.pull_request.title }}") was just merged.
            Body: ${{ github.event.pull_request.body }}

            1. Use `gh pr view ${{ github.event.pull_request.number }} --json closingIssuesReferences` to find linked issues.
            2. For each issue that was NOT auto-closed by GitHub (i.e. still open), post a short progress comment.
            3. Search for other open issues whose title overlaps with this PR's changes, and post a brief cross-reference comment if relevant.

            Do NOT close any issues — GitHub handles that via "fixes #N" keywords.
            Do NOT touch queue labels — another job handles that.
            Keep comments under 5 lines.
