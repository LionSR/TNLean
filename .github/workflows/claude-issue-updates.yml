name: Queue & Issue Updates on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  # Job 1: Pure gh CLI — promote next issue in queue, update related issues
  promote-and-update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Update related issues with progress
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Use GitHub's closingIssuesReferences API to find linked issues
          LINKED=$(gh api graphql -f query='
            query {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                pullRequest(number: '"$PR_NUM"') {
                  closingIssuesReferences(first: 20) {
                    nodes { number title state }
                  }
                }
              }
            }' --jq '.data.repository.pullRequest.closingIssuesReferences.nodes')

          # Post progress comment on issues that are still open (partially addressed)
          echo "$LINKED" | jq -c '.[] | select(.state == "OPEN")' | while read -r issue; do
            ISSUE_NUM=$(echo "$issue" | jq -r '.number')
            echo "Posting progress update on issue #$ISSUE_NUM"
            gh issue comment "$ISSUE_NUM" --repo "$GITHUB_REPOSITORY" \
              --body "Progress update: PR #$PR_NUM ($PR_TITLE) has been merged and partially addresses this issue."
          done

      - name: Promote next queued issue
        id: promote
        run: |
          PR_NUM=${{ github.event.pull_request.number }}

          # 1. Activate the oldest "queue-next" issue
          NEXT=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label "queue-next" --state open --sort created --json number \
            --jq '.[0].number // empty')

          if [ -n "$NEXT" ]; then
            echo "Activating queue-next issue #$NEXT"
            gh issue edit "$NEXT" --repo "$GITHUB_REPOSITORY" \
              --remove-label "queue-next" --add-label "claude"
            gh issue comment "$NEXT" --repo "$GITHUB_REPOSITORY" \
              --body "@claude PR #$PR_NUM has been merged. Please start working on this issue."
            echo "activated=$NEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. No queue-next? Promote the oldest "queue" issue
          QUEUED=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label "queue" --state open --sort created --json number \
            --jq '.[0].number // empty')

          if [ -n "$QUEUED" ]; then
            echo "Promoting queue issue #$QUEUED to queue-next"
            gh issue edit "$QUEUED" --repo "$GITHUB_REPOSITORY" \
              --remove-label "queue" --add-label "queue-next"
            gh issue comment "$QUEUED" --repo "$GITHUB_REPOSITORY" \
              --body "PR #$PR_NUM has been merged. This issue has been promoted to next in queue."
          else
            echo "No queued issues found."
          fi
