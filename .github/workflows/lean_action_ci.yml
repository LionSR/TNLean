name: Lean Action CI

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
  pull_request:
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
