name: Claude Code Review (Lean)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "TNLean/**/*.lean"
      - "TNLean.lean"
      - "lakefile.toml"
      - "lean-toolchain"
      - "blueprint/src/**/*.tex"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Lean toolchain and cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude,chatgpt-codex-connector,cursor[bot],cursor,copilot-pull-request-reviewer'
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
            https://github.com/leanprover/skills.git
          plugins: |
            code-review@claude-code-plugins
            lean@leanprover
          prompt: |
            Review this Lean 4 pull request: ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            Trigger event: ${{ github.event.action }}

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.

            Focus your review on:
            1. **Proof integrity / cheating detection**: Flag ANY of the following patterns as BLOCKERS:
               - `sorry`, `admit` — direct proof holes
               - `native_decide` — relies on trusted native evaluation / compiler and is banned in Mathlib for soundness and process reasons
               - `unsafeCast`, `unsafeCoerce` — type system bypass, can fabricate any proof
               - `lcProof` — low-level proof fabrication primitive
               - `ofReduceBool`, `ofReduceNat` — kernel primitives exploitable for unsound proofs
               - `axiom` declarations — introduces unproven assumptions (must be justified)
               - `constant ... : Prop` — equivalent to an axiom
               Also flag as WARNINGS:
               - `implemented_by` / `implementedBy` — can decouple runtime from spec
               - `exact?`, `apply?`, `library_search`, `suggest` — placeholder search tactics
               - `unsafe def`, `partial def` — bypass safety/termination checks
               - `set_option maxHeartbeats 0` — disables timeout, hides non-termination
               - `set_option maxHeartbeats` with values >= 10,000,000
               - `dbg_trace`, `stop` — debug aids left in code
               - `#check`, `#eval`, `#print` commands in proof files
               For each finding, explain WHY it is problematic and suggest the correct alternative.
            2. **Circular reasoning detection**: This is critical. Lean's kernel forbids literal declaration cycles, so focus on *mathematical* circularity instead. Look for:
               - Proofs that assume (or trivially reintroduce) the statement being proved as a local hypothesis, then immediately close the goal from that hypothesis
               - Helper lemmas declared in the same file that essentially restate the main goal and are only used to prove that goal
               - Local `have`/`let` bindings that are just the goal rephrased, and are then used to solve the goal without any real argument
               - Use of newly introduced `axiom` / `constant : Prop` (or similar) that make a difficult statement provable without connecting to existing Mathlib / core theorems
               - Abuse of `unsafe` features or non-computational tricks to fabricate proofs instead of giving a genuine derivation
               - Tactics or patterns like `by exact h` where `h` is essentially the same as the goal and itself came from an unjustified assumption
               Flag such circular or vacuous proofs as BLOCKERS — Lean may accept them syntactically, but they do not constitute a valid mathematical argument.
            3. **Castle-in-the-air detection**: Look for proofs that avoid grounding in Mathlib:
               - Custom re-declarations of standard Mathlib lemmas (e.g., re-proving commutativity of addition instead of using `add_comm`)
               - New `axiom` or `sorry`-based helper lemmas for facts that already exist in Mathlib — search Mathlib for the equivalent
               - A chain of custom lemmas that never bottoms out in Mathlib or Lean core — the proof should ultimately be rooted in established results
               - `private` helper lemmas that duplicate Mathlib API (e.g., custom matrix transpose lemmas when `Matrix.transpose_*` exists)
               - Overly long proof chains that could be replaced by a single Mathlib lemma
               For each finding, perform an actual lookup (e.g., grep, `#find?`, `exact?`, `library_search`):
                 - If you find an equivalent, name the Mathlib lemma/definition and, when possible, cite its module path or a concrete reference.
                 - If no equivalent is found, state "no equivalent found" and briefly describe the search you performed.
            4. **Proof correctness**: Are proof terms well-structured?
            5. **Mathlib style**: Does the code follow Mathlib conventions (naming, tactic style, imports)?
            6. **Type safety**: Any type mismatches, universe issues, or coercion problems?
            7. **Performance**: Will any proofs cause timeouts? Are there unnecessarily expensive tactics (e.g., `decide` on large types)?
            8. **Modularity**: Are new lemmas general enough? Could any be upstreamed to Mathlib?
            9. **Documentation**: Do new definitions/theorems have docstrings where appropriate?

            For each issue found, post an inline comment on the relevant line using the GitHub CLI.
            At the end, post a summary comment on the PR with your overall assessment.

            **Reading existing feedback:**
            Before posting new comments, read ALL existing feedback on this PR using the GitHub MCP tools:
            1. Read **inline review threads** via `get_review_comments` — these are code-level comments from previous review cycles.
            2. Read **PR conversation comments** via `get_comments` — bots and humans often post feedback, summaries,
               and discussion directly on the PR thread (not as inline review comments). These are equally important.
            This includes threads from previous review cycles and any replies from @claude, other bots, or human reviewers.
            Use this context to:
            - Avoid re-raising issues that have already been discussed, acknowledged, or fixed in either location.
            - Understand any ongoing conversation or decisions made in earlier threads or PR comments.

            **Resolving previous review comments:**
            When this review is triggered by a `synchronize` event (new push to the PR):
            1. First, fetch all review threads **with their GraphQL node IDs** using `gh api graphql`.
               The `get_review_comments` MCP method does NOT return thread IDs, so you MUST use GraphQL.
            2. For each unresolved thread where the author login starts with `claude`, `copilot-pull-request-reviewer`, or `chatgpt-codex-connector`
               (note: GitHub may append `[bot]` to app logins — match the base name as a prefix to handle both forms),
               check whether the new changes address the issue raised in that comment.
               Do NOT resolve threads from `cursor`/Bugbot — that bot manages its own thread resolution.
            3. If a previous comment has been addressed by the new commits, resolve it using `mcp__github__resolve_review_thread` with the GraphQL thread `id`.
            4. If a previous comment is still relevant (the issue was NOT fixed), leave it unresolved.
            5. Only resolve bot threads — never resolve threads authored by human reviewers.
            This prevents stale bot comments from accumulating across review cycles.

            **Example: How to fetch thread IDs and resolve them**

            Step 1 — Query thread IDs via GraphQL (returns up to 100 threads; see Step 3 for pagination):
            ```bash
            gh api graphql -f query='
            {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                pullRequest(number: ${{ github.event.pull_request.number }}) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      isOutdated
                      comments(first: 1) {
                        nodes {
                          author { login }
                          body
                        }
                      }
                    }
                    pageInfo { hasNextPage endCursor }
                  }
                }
              }
            }'
            ```
            This returns thread objects with `id` fields like `"PRRT_kwDON..."`. Use pagination if `hasNextPage` is true.

            Step 2 — For each unresolved bot thread whose issue is now fixed, resolve it:
            ```
            mcp__github__resolve_review_thread(threadId: "PRRT_kwDON...")
            ```

            Step 3 — If there are more than 100 threads, paginate:
            ```bash
            gh api graphql -f query='
            {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                pullRequest(number: ${{ github.event.pull_request.number }}) {
                  reviewThreads(first: 100, after: "CURSOR_FROM_PREVIOUS_PAGE") {
                    nodes { id isResolved isOutdated comments(first: 1) { nodes { author { login } body } } }
                    pageInfo { hasNextPage endCursor }
                  }
                }
              }
            }'
            ```

          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api graphql:*),Bash(lake build),Bash(lake exe cache get),Bash(lake update),Bash(lake env),Bash(lean *),Bash(elan *),Bash(grep *),mcp__github__*"
            --append-system-prompt "This is a Lean 4 / Mathlib formalization project for quantum information theory (MPS tensors, quantum channels, Wielandt theorem). Review with mathematical rigor. Flag any sorry that is not clearly marked as a known TODO."
