name: Full documentation

on:
  schedule:
    # Run weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build docs from (default: main)'
        required: false
        default: 'main'

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project and generate docs
    timeout-minutes: 330
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}

      - name: Build project
        uses: leanprover/lean-action@v1
        with:
          build: true

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install TeX and graphviz
        uses: ./.github/actions/setup-blueprint-system-deps
        with:
          cache-suffix: docgen-v1
          extra-packages: latexmk texlive-science texlive-xetex

      - name: Install leanblueprint
        run: python3 -m pip install -r .github/requirements/blueprint-python.txt

      - name: Build blueprint bibliography
        run: python3 scripts/blueprint_bibtex.py

      - name: Build blueprint
        working-directory: blueprint
        run: |
          leanblueprint pdf
          set -o pipefail
          tmp_output_file="$(mktemp)"

          set +o pipefail
          leanblueprint web 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi
          if grep -R "TikZ SVG unavailable" web --include='*.html'; then
            echo "::error::Blueprint contains unrendered TikZ SVG placeholders"
            exit 1
          fi

      - name: Generate API docs
        run: |
          cd docbuild
          lake build TNLean:docs

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --with-docs --ci
