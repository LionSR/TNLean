name: Daily Standup Summary

on:
  schedule:
    - cron: "0 8 * * 1-5"  # Weekdays at 08:00 UTC
  workflow_dispatch:         # Manual trigger for on-demand summaries

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  daily-standup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute today's date
        id: date
        run: echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Gather recent activity
        id: activity
        uses: actions/github-script@v8
        with:
          script: |
            // On Monday (day 1), look back 72 hours to capture weekend activity.
            // On other weekdays, look back 24 hours.
            const now = new Date();
            const hoursBack = now.getUTCDay() === 1 ? 72 : 24;
            const since = new Date(Date.now() - hoursBack * 60 * 60 * 1000).toISOString();
            const sinceDate = since.split('T')[0];

            // Merged PRs in the lookback window
            const mergedPRs = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged merged:>=${sinceDate}`,
              per_page: 50
            });

            // Open PRs with recent activity
            const activePRs = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open updated:>=${sinceDate}`,
              per_page: 50
            });

            // Recently closed issues (exclude standup issues to avoid self-referential reporting)
            const closedIssues = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:closed closed:>=${sinceDate} -label:standup`,
              per_page: 50
            });

            // Recently opened issues (exclude standup issues)
            const openedIssues = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open created:>=${sinceDate} -label:standup`,
              per_page: 50
            });

            // Recent commits on the default branch
            let recentCommits = [];
            try {
              const commits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: 'main',
                since: since,
                per_page: 50
              });
              recentCommits = commits.data.map(c => ({
                sha: c.sha.substring(0, 7),
                message: c.commit.message.split('\n')[0],
                author: c.commit.author.name,
                date: c.commit.author.date
              }));
            } catch (e) {
              core.warning(`Failed to fetch commits: ${e.message}`);
              recentCommits = [];
            }

            // PR review comments in the last 24 hours (from both open and merged PRs)
            let reviewComments = [];
            const allRecentPRs = [
              ...activePRs.data.items.slice(0, 10),
              ...mergedPRs.data.items.slice(0, 10)
            ];
            // Deduplicate by PR number
            const seenPRs = new Set();
            const uniquePRs = allRecentPRs.filter(pr => {
              if (seenPRs.has(pr.number)) return false;
              seenPRs.add(pr.number);
              return true;
            });
            for (const pr of uniquePRs.slice(0, 15)) {
              try {
                const comments = await github.rest.pulls.listReviewComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  since: since,
                  per_page: 20
                });
                for (const c of comments.data) {
                  reviewComments.push({
                    pr: pr.number,
                    prTitle: pr.title,
                    body: c.body.substring(0, 300),
                    author: c.user.login
                  });
                }
              } catch (e) {
                core.warning(`Failed to fetch review comments for PR #${pr.number}: ${e.message}`);
              }
            }

            return {
              since,
              hoursBack,
              mergedPRs: mergedPRs.data.items.map(p => ({
                number: p.number,
                title: p.title,
                user: p.user.login,
                labels: p.labels.map(l => l.name)
              })),
              activePRs: activePRs.data.items.map(p => ({
                number: p.number,
                title: p.title,
                user: p.user.login,
                labels: p.labels.map(l => l.name),
                draft: p.pull_request?.draft ?? false
              })),
              closedIssues: closedIssues.data.items.map(i => ({
                number: i.number,
                title: i.title,
                labels: i.labels.map(l => l.name)
              })),
              openedIssues: openedIssues.data.items.map(i => ({
                number: i.number,
                title: i.title,
                labels: i.labels.map(l => l.name)
              })),
              recentCommits,
              reviewComments: reviewComments.slice(0, 30)
            };

      - name: Generate standup summary with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a pure mathematician writing a daily research diary entry for the
            TNLean project (${{ github.repository }}) — a Lean 4 formalization of results
            in quantum information theory.

            The mathematics lives in: operator algebras on finite-dimensional Hilbert
            spaces $\mathcal{H} \cong \mathbb{C}^d$, completely positive trace-preserving
            maps $\Phi : M_d(\mathbb{C}) \to M_d(\mathbb{C})$, tensor network states
            (MPS, PEPS), and the spectral theory that underpins them. The main threads:
            - The Fundamental Theorem of MPS: canonical forms, injectivity, and the
              transfer matrix $\mathbb{E} = \sum_i A_i \otimes \bar{A}_i$
            - Quantum Wielandt theory: $\exists N$ s.t. $\mathcal{E}^N$ has full Kraus rank
            - Quantum channels per Wolf's *Quantum Channels & Operations*
            - Algebraic foundations via Mathlib ($C^*$-algebras, `StarAlgHom`, etc.)

            Write as if composing notes for a research seminar — assume the reader is
            a mathematician who cares about the actual content of theorems, not project
            management. Use $\LaTeX$ freely for mathematical statements. When a result
            was proved, state the result precisely (e.g., "$\mathrm{rank}(\mathbb{E}) = d^2$
            for injective MPS" rather than "proved a rank lemma"). When a `sorry` was
            eliminated, say what the proof strategy was. Note dependencies between results.

            Today's date: ${{ steps.date.outputs.today }}
            Activity window: last ${{ fromJSON(steps.activity.outputs.result).hoursBack }} hours (since ${{ fromJSON(steps.activity.outputs.result).since }})

            === REPOSITORY ACTIVITY DATA ===

            MERGED PULL REQUESTS:
            ${{ toJSON(fromJSON(steps.activity.outputs.result).mergedPRs) }}

            ACTIVE (OPEN) PULL REQUESTS:
            ${{ toJSON(fromJSON(steps.activity.outputs.result).activePRs) }}

            CLOSED ISSUES:
            ${{ toJSON(fromJSON(steps.activity.outputs.result).closedIssues) }}

            NEWLY OPENED ISSUES:
            ${{ toJSON(fromJSON(steps.activity.outputs.result).openedIssues) }}

            RECENT COMMITS ON MAIN:
            ${{ toJSON(fromJSON(steps.activity.outputs.result).recentCommits) }}

            PR REVIEW COMMENTS (sample):
            ${{ toJSON(fromJSON(steps.activity.outputs.result).reviewComments) }}

            === INSTRUCTIONS ===

            Analyze the activity above and produce a standup summary. For additional
            context, read the actual Lean source files changed (use Read/Glob/Grep) to
            understand the mathematical content of proofs, not just commit messages.
            Use git log and git diff for the activity window above to see what changed in detail.

            Before creating any issue, use the mcp__github__search_issues tool to check
            whether a standup issue for today's date already exists (search for
            "Daily Standup — ${{ steps.date.outputs.today }}" with the "standup" label).
            If such an issue exists, DO NOT create a new one — instead, use
            mcp__github__add_issue_comment to update the existing issue.

            If no such issue exists, use mcp__github__issue_write to create a GitHub
            issue with the title: "Daily Standup — ${{ steps.date.outputs.today }}" and
            label it "standup". Use mcp__github__get_label to check if the label exists
            first, and use Bash(gh label create *) to create it if needed.

            The issue body MUST follow this structure (use $\LaTeX$ throughout):

            ## Results

            State each new theorem, lemma, or definition precisely. For example:

            > **Theorem** (`MPS.TransferMatrix.rank_eq`). Let
            > $|\psi\rangle = \sum_{i_1,\ldots,i_N} \mathrm{tr}(A_{i_1} \cdots A_{i_N}) |i_1 \cdots i_N\rangle$
            > be an injective MPS with bond dimension $D$. Then $\mathrm{rank}(\mathbb{E}) = D^2$.
            >
            > *Proof strategy*: Via `LinearMap.rank_eq_of_surjective` after showing the
            > Choi matrix $C_\mathbb{E}$ is positive definite. Key step: the injectivity
            > hypothesis gives $\mathrm{span}\{A_i\} = M_D(\mathbb{C})$, so
            > $\mathbb{E}$ acts as the identity on $M_D(\mathbb{C}) \otimes M_D(\mathbb{C})$.
            > Eliminates `sorry` from `TransferMatrix.lean:142`.

            Include: the Lean declaration name, the mathematical statement in $\LaTeX$,
            the proof strategy with key lemmas cited, and which `sorry`s (if any) were
            discharged. Also note new `def`/`structure`/`class` introductions with their
            mathematical meaning.

            ## Scaffolding

            Briefly list supporting work: new `simp` lemmas, coercion instances,
            Mathlib API extensions, import reorganization. One line each — these are
            important but not the headline. E.g.:

            - Added `instance : StarAlgHom (QuantumChannel d)` for compatibility
              with Mathlib's $C^*$-algebra hierarchy
            - New simp lemma: $\langle \phi | \mathbb{E}(|\psi\rangle\langle\psi|) | \phi \rangle \geq 0$

            ## Observations

            Mathematical observations that emerged from the formalization work:
            connections between results, subtleties not visible on paper, Mathlib
            gaps discovered, or upstream contributions being prepared. Write this
            like remarks in a seminar — e.g., "The proof of Wielandt's bound
            requires $\gcd\{k : \mathcal{E}^k \text{ has full Kraus rank}\} = 1$,
            which is more subtle in the formal setting because..."

            ## Open questions

            Remaining `sorry` obligations stated as precise mathematical problems.
            For each, state what needs to be shown and what approaches look promising.
            E.g.: "Need to show $\|\mathcal{E}^n - \mathcal{E}_\infty\| \leq C \lambda^n$
            where $\lambda$ is the second-largest eigenvalue of $\mathbb{E}$.
            Likely route: spectral gap via `Matrix.IsHermitian.eigenvalues`."

            ## Log

            Brief record: PRs merged/opened (with numbers), issues resolved/created,
            commits to main. Just the facts, 2–4 lines.

            ---

            Guidelines:
            - Write for mathematicians, not project managers. The reader wants to
              know what was *proved*, not what was *done*.
            - Use $\LaTeX$ for all mathematical notation — operators ($\mathcal{E}$,
              $\mathbb{E}$), spaces ($M_d(\mathbb{C})$, $\mathcal{H}$), norms,
              inequalities, and quantified statements.
            - State theorems precisely: hypotheses, conclusion, and the Lean name.
            - Reference PR/issue numbers (#123) and file paths where relevant.
            - If there was no activity, state so in one line.
            - Every claim should be specific and verifiable — no vague phrases like
              "progress was made on MPS theory."
            - This is a self-contained document. Do not include your reasoning
              process or investigation steps — only polished conclusions.

          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Glob,Grep,Bash(git log *),Bash(git diff *),Bash(git show *),Bash(gh label create *),mcp__github__search_issues,mcp__github__issue_write,mcp__github__issue_read,mcp__github__add_issue_comment,mcp__github__get_label,mcp__github__list_issues,mcp__github__search_pull_requests,mcp__github__list_pull_requests,mcp__github__pull_request_read,mcp__github__list_commits"
