name: Tracking Issue
description: Create a tracking issue for a group of mathematical tasks
title: "Tracking: <area>"
labels: ["tracking"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tracking Issue
        Use this template for a family of related mathematical tasks.
        Each task should be a separate GitHub issue with its own statement and source citation.
        Create each mathematical task as a separate issue, then attach those
        issues in GitHub's native Sub-issues panel. Do not use Markdown
        tasklists or checkbox lists for tracked work.
        The title should begin with `Tracking:` and should not contain brackets.

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area of the project does this track?
      placeholder: e.g., MPS, Channel, Wielandt, Infrastructure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Mathematical goal
      description: >-
        Describe the theorem, chapter, construction, or proof family covered by
        this tracking issue.
      placeholder: |
        Formalize the spectral decomposition results for finite-dimensional
        quantum channels in Wolf Chapter 6, with each sub-issue tied to a
        theorem label or blueprint entry.
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: >-
        List the papers, blueprint files, theorem labels, or repository notes
        that define the scope.
      placeholder: |
        - Wolf Lecture Notes, Chapter 6, Theorems 6.14--6.18
        - `blueprint/src/chapter/ch06_spectral.tex:120`
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Sub-issues
      description: |
        List issue numbers that should be attached in GitHub's native
        Sub-issues panel after this issue is created. Each line should contain
        only an issue reference. Put mathematical descriptions in the
        sub-issue titles and bodies.
      value: |
        #42
        #43
      placeholder: |
        #42
        #43
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Dependencies and order
      description: State mathematical dependencies, proposed order, or milestone information.
      placeholder: |
        Prove the fixed-point algebra statements before the peripheral-spectrum statements.
    validations:
      required: false
