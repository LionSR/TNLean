name: Tracking Issue
description: Create a tracking issue to monitor progress across multiple related issues and PRs
labels: ["tracking"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tracking Issue

        Use this template to create an umbrella issue that tracks progress across
        multiple related issues and PRs.

        Children are attached as **native GitHub sub-issues** — not as a
        ` ```[tasklist] ` block (that syntax was retired on 2025-04-30 and now
        renders as raw Markdown). After opening this issue, attach each child
        either from the sub-issues panel in the GitHub UI or via the API:

        ```bash
        # REST: attach #234 as a sub-issue of <this issue>
        gh api -X POST repos/lionsr/tnlean/issues/<this-issue>/sub_issues \
          -f sub_issue_id=$(gh api repos/lionsr/tnlean/issues/234 -q .id)
        ```

        From an MCP-aware agent, call `mcp__github__sub_issue_write` with
        `method: "add"`.

        The `## Native sub-issues` section below should mirror those attachments
        as a human-readable bullet list — one `- #N — short note` line per child.
        The list is informational; the parent/child link itself lives in the
        sub-issue API. The `tracking-issue-sync` workflow keeps the bullet list
        in sync with the actual sub-issues.

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area of the project does this track?
      placeholder: e.g., MPS, Channel, Wielandt, Infrastructure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the goal this tracking issue covers
      placeholder: What is the overall objective?
    validations:
      required: true

  - type: textarea
    id: subissues
    attributes:
      label: Native sub-issues
      description: |
        Mirror the attached native sub-issues as plain markdown bullets. One
        issue per line, in the form `- #N — short note`. Update this list (or
        let the `tracking-issue-sync` workflow update it) when sub-issues are
        added or closed. Do not paste `- [ ] #N` checkboxes or
        ` ```[tasklist] ` fences.
      value: |
        ## Native sub-issues

        - #
        - #
      placeholder: |
        ## Native sub-issues

        - #42 — definitions layer
        - #43 — main theorem assembly
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra context, dependencies, milestones, or "Completed on `main`" history
      placeholder: Optional notes
    validations:
      required: false
