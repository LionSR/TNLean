name: Tracking Issue
description: Create a tracking issue to monitor progress across multiple issues and PRs
labels: ["tracking"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tracking Issue
        Use this template to create an umbrella issue that tracks progress across multiple related sub-tasks.

        After creating this issue, add child issues as **native GitHub subissues** using the
        "Add sub-issue" button in the sidebar. Each child issue will show "Tracked by #N" automatically.

        The `tracking-issue-sync` workflow will monitor subissue state and:
        - Comment when subissues are closed or reopened
        - Add the `all-resolved` label when every subissue is complete

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area of the project does this track?
      placeholder: e.g., MPS, Channel, Wielandt, Infrastructure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the goal this tracking issue covers
      placeholder: What is the overall objective?
    validations:
      required: true

  - type: textarea
    id: initial-subissues
    attributes:
      label: Initial Sub-issues
      description: |
        List issue numbers to attach as subissues after creation (one per line).
        The automation will attach these as native subissues.
        You can also add subissues manually via the GitHub UI after creation.
      placeholder: |
        #42
        #43
        #44
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra context, dependencies, or milestones
      placeholder: Optional notes
    validations:
      required: false
