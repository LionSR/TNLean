name: Tracking Issue
description: Create a tracking issue for a group of mathematical tasks
labels: ["tracking"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tracking Issue
        Use this template for a family of related mathematical tasks.
        Overall tracking issue titles start with `Tracking:`.
        Example: `Tracking: Wolf Ch6 spectral properties`.
        Add child issues through GitHub's native Sub-issues relation, not through Markdown checkbox lists.
        Write the title, description, notes, and sub-issue titles in ordinary mathematical prose, using the terminology of the relevant tensor-network, MPS, quantum-channel, or operator-algebra literature.

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area of the project does this track?
      placeholder: e.g., MPS, Channel, Wielandt, Infrastructure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Mathematical goal
      description: >-
        Describe the theorem, chapter, construction, or proof family covered by
        this tracking issue.
      placeholder: |
        Formalize the spectral decomposition results for finite-dimensional
        quantum channels in Wolf Chapter 6, with each sub-issue tied to a
        theorem label or blueprint entry.
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: >-
        List the papers, blueprint files, theorem labels, or repository notes
        that define the scope.
      placeholder: |
        - Wolf Lecture Notes, Chapter 6, Theorems 6.14--6.18
        - `blueprint/src/chapter/ch06_spectral.tex:120`
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Sub-issues
      description: |
        List any existing issue numbers that should be attached through GitHub Sub-issues after creation.
        Do not use Markdown checkbox syntax here.
      placeholder: |
        #42
        #43
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Dependencies and order
      description: State mathematical dependencies, proposed order, or milestone information.
      placeholder: |
        Prove the fixed-point algebra statements before the peripheral-spectrum statements.
    validations:
      required: false
