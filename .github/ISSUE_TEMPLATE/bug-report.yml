name: Bug Report
description: Report a broken proof, type error, sorry regression, or CI failure
labels: ["bug"]
body:
  - type: input
    id: file
    attributes:
      label: File(s) affected
      description: Path to the Lean file(s) with the issue
      placeholder: "e.g., TNLean/MPS/Core/Transfer.lean"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken? Include error messages or sorry locations.
      placeholder: |
        `lake build` fails with:
        ```
        error: unknown identifier 'foo'
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: false

  - type: input
    id: toolchain
    attributes:
      label: Lean toolchain
      description: Output of `cat lean-toolchain`
      placeholder: "e.g., leanprover/lean4:v4.16.0"
    validations:
      required: false
