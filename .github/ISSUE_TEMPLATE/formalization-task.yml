name: Formalization Task
description: A specific theorem, definition, or lemma to formalize in Lean
labels: ["formalization"]
body:
  - type: markdown
    attributes:
      value: |
        **Title convention.** Use `<area>: <mathematical result or construction>`.
        Avoid bracket prefixes and software-process wording. Example:
        `MPS/CanonicalForm: assemble cyclic sectors at a common blocking length`.

  - type: input
    id: statement
    attributes:
      label: Mathematical statement
      description: State the theorem, definition, or lemma in mathematical language.
      placeholder: "e.g., Wolf Thm 6.15: faithful fixed points yield a conditional expectation"
    validations:
      required: true

  - type: input
    id: reference
    attributes:
      label: Reference
      description: >-
        Paper, textbook, or blueprint citation, including theorem/lemma label
        if available.
      placeholder: "e.g., arXiv:1804.04964 Theorem 3.2, Wolf Lecture Notes Prop 7.4"
    validations:
      required: true

  - type: textarea
    id: source_location
    attributes:
      label: Source location and quotation
      description: >-
        Give a file path and line number when the source is in this repository,
        plus a short quotation or precise paraphrase of the mathematical claim.
      placeholder: |
        - Source: `blueprint/src/chapter/ch06_spectral.tex:142`
        - Label: `thm:peripheral-fixed-point`
        - Claim: The peripheral fixed points form a finite-dimensional
          C*-algebra under the stated hypotheses.
    validations:
      required: true

  - type: input
    id: lean_target
    attributes:
      label: Target Lean declaration
      description: Expected Lean name and file path
      placeholder: "e.g., MPSTensor.fundamentalTheorem in TNLean/MPS/FundamentalTheorem.lean"
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Existing formalized results, blueprint entries, or issues this depends on
      placeholder: |
        - `MPSTensor.transferMap` (exists)
        - `blueprint/src/chapter/ch06_spectral.tex:118`
        - #191 (ground space definitions, in progress)
    validations:
      required: false

  - type: textarea
    id: sketch
    attributes:
      label: Proof sketch / approach
      description: >-
        Brief mathematical proof sketch, with the main lemmas or reductions
        expected.
      placeholder: |
        Reduce to the finite-dimensional spectral decomposition, identify the
        fixed-point projection, and apply the cited conditional-expectation theorem.
    validations:
      required: false

  - type: input
    id: tracking
    attributes:
      label: Tracking issue
      description: Parent tracking issue if applicable
      placeholder: "e.g., #190"
    validations:
      required: false
